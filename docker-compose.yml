services:
  runwrk:
    build: .
    container_name: runwrk-daemon
    restart: unless-stopped
    volumes:
      - runwrk-data:/app/.runwrk
    env_file:
      - .env.local
    environment:
      - RUNWRK_DAEMON=1
    logging:
      driver: "local"
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "cat", "/app/.runwrk/daemon-health.json"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  runwrk-data:
