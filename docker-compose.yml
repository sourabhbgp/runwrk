services:
  myteam:
    build: .
    container_name: myteam-daemon
    restart: unless-stopped
    volumes:
      - myteam-data:/app/.myteam
    env_file:
      - .env.local
    environment:
      - MYTEAM_DAEMON=1
    logging:
      driver: "local"
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "cat", "/app/.myteam/daemon-health.json"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  myteam-data:
